name: Sync Linear Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - uses: linear/linear-release-action@c0cb8354a362c24c6d3e0948f37fd66d07588e3f
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY_CAPACITOR }}
          command: sync
          timeout: 120
